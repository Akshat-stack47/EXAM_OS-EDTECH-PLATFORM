name: Branch Guard
on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
  create:

jobs:
  check-branch-name:
    name: Check branch name convention
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request?.head.ref ?? context.ref
            const pattern = /^(feat|fix|chore|hotfix|deps)\/[a-z0-9._-]+$/
            if (context.payload.pull_request && !pattern.test(branch)) {
              core.setFailed(`Branch name "${branch}" does not match pattern: feat|fix|chore|hotfix|deps/<description>`)
            }

  check-commit-message:
    name: Check conventional commit message
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            })
            const pattern = /^(feat|fix|chore|docs|refactor|test|perf|ci|style)(\(.+\))?: .{1,72}$/
            for (const commit of commits) {
              const msg = commit.commit.message.split('\n')[0]
              if (!pattern.test(msg)) {
                core.setFailed(`Commit "${msg}" does not follow conventional commit format`)
                return
              }
            }

  pr-title-check:
    name: Check PR title format
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title
            const pattern = /^(feat|fix|chore|docs|refactor|test|perf|ci|style)(\(.+\))?: .{1,72}$/
            if (!pattern.test(title)) {
              core.setFailed(`PR title "${title}" does not follow conventional commit format`)
            }
